    <text x="1040" y="302" text-anchor="middle" font-size="11" fill="#a8b8e0">Threat feed · MITRE map</text>
    <text x="1040" y="319" text-anchor="middle" font-size="11" fill="#a8b8e0">One-click block button</text>
