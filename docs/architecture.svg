  <line x1="305" y1="250" x2="425" y2="280" stroke="#5eead4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="365" y="248" text-anchor="middle" font-size="10" fill="#5eead4">POST /ingest</text>

  <line x1="305" y1="450" x2="425" y2="400" stroke="#5eead4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="365" y="436" text-anchor="middle" font-size="10" fill="#5eead4">POST /ingest</text>

  <line x1="755" y1="280" x2="895" y2="240" stroke="#5eead4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="825" y="248" text-anchor="middle" font-size="10" fill="#5eead4">WebSocket · threat</text>

  <line x1="755" y1="400" x2="895" y2="440" stroke="#5eead4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="825" y="408" text-anchor="middle" font-size="10" fill="#5eead4">WebSocket · push</text>

  <line x1="895" y1="490" x2="755" y2="490" stroke="#ff4d6d" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrowRed)"/>
