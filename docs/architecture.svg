  <g transform="translate(60, 600)">
    <text font-size="11" fill="#7c9bff" letter-spacing="3">SECURITY · ATT&amp;CK · CATALOG</text>
    <text y="22" font-size="11" fill="#a8b8e0">T1046 · T1110 · T1071 · T1557.002 · T1498 · T1041 · T1095</text>
