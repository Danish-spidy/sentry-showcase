    <linearGradient id="brain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2547"/>
      <stop offset="100%" stop-color="#0e1428"/>
    </linearGradient>
    <linearGradient id="sensor" x1="0" y1="0" x2="1" y2="1">
