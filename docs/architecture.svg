    <path d="M100,0 L100,720 M200,0 L200,720 M300,0 L300,720 M400,0 L400,720 M500,0 L500,720 M600,0 L600,720 M700,0 L700,720 M800,0 L800,720 M900,0 L900,720 M1000,0 L1000,720 M1100,0 L1100,720 M1200,0 L1200,720 M1300,0 L1300,720"/>
  </g>

