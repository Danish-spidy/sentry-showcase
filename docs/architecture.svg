    <text x="1040" y="502" text-anchor="middle" font-size="11" fill="#a8b8e0">One-tap host quarantine</text>
    <text x="1040" y="519" text-anchor="middle" font-size="11" fill="#a8b8e0">Auto-reconnect WS</text>
